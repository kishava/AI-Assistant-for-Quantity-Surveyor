<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QS Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0b0f19;
      color: #f3f4f6;
      user-select: none;
      -webkit-user-select: none;
    }
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 28px 32px;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99, 102, 241, 0.18), transparent),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(6, 182, 212, 0.1), transparent),
        #0b0f19;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
    }
    .logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(99, 102, 241, 0.25));
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .logo svg { color: #06b6d4; }
    h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 4px; }
    .tagline { font-size: 0.78rem; color: #9ca3af; margin-bottom: 16px; }
    .status {
      font-size: 0.82rem;
      color: #e5e7eb;
      min-height: 1.2rem;
      text-align: center;
      margin-bottom: 6px;
      max-width: 360px;
    }
    .status-hint {
      font-size: 0.72rem;
      color: #9ca3af;
      text-align: center;
      margin-bottom: 12px;
      max-width: 360px;
      min-height: 1rem;
    }
    .progress-log {
      width: 100%;
      max-width: 380px;
      max-height: 88px;
      overflow-y: auto;
      font-size: 0.68rem;
      color: #6b7280;
      text-align: left;
      padding: 8px 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(0, 0, 0, 0.25);
      display: none;
    }
    .progress-log.visible { display: block; }
    .progress-log div { margin-bottom: 2px; }
    .progress-track {
      width: 200px;
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, #06b6d4, #6366f1);
      border-radius: 999px;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" x2="2" y1="12" y2="12"/>
        <path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
        <line x1="6" x2="6.01" y1="16" y2="16"/>
        <line x1="10" x2="10.01" y1="16" y2="16"/>
      </svg>
    </div>
    <h1>QS Assistant</h1>
    <p class="tagline">Quantity surveying · offline-first</p>
    <p class="status" id="status">Starting up…</p>
    <p class="status-hint" id="hint"></p>
    <div class="progress-log" id="log"></div>
    <div class="progress-track" role="progressbar" aria-label="Loading">
      <div class="progress-bar"></div>
    </div>
  </div>
  <script>
    (function () {
      var logEl = document.getElementById('log');
      var logLines = [];
      function appendLog(line) {
        if (!line) return;
        logLines.push(line);
        if (logLines.length > 8) logLines.shift();
        logEl.innerHTML = logLines.map(function (l) { return '<div>' + l + '</div>'; }).join('');
        logEl.classList.add('visible');
        logEl.scrollTop = logEl.scrollHeight;
      }
      if (window.splashAPI) {
        window.splashAPI.onStatus(function (text) {
          var el = document.getElementById('status');
          if (el && text) el.textContent = text;
        });
        window.splashAPI.onHint(function (text) {
          var el = document.getElementById('hint');
          if (el) el.textContent = text || '';
        });
        window.splashAPI.onLog(function (text) {
          appendLog(text);
        });
      }
    })();
  </script>
</body>
</html>
